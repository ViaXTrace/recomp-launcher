name: Build & Release RECOMP

on:
  push:
    branches: [main, develop]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        working-directory: recomp-launcher
        run: flutter pub get

      - name: Run analyzer
        working-directory: recomp-launcher
        run: flutter analyze --no-fatal-infos

      # ─── Debug build (on every push to branches) ─────────────────────────
      - name: Build debug APK
        if: github.ref_type != 'tag'
        working-directory: recomp-launcher
        run: flutter build apk --debug

      - name: Upload debug APK
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: recomp-debug-${{ github.sha }}
          path: recomp-launcher/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 14

      # ─── Release build (on every v*.*.* tag) ─────────────────────────────
      - name: Build release APKs (split per ABI)
        if: github.ref_type == 'tag'
        working-directory: recomp-launcher
        run: |
          flutter build apk --release --split-per-abi
          echo "Built APKs:"
          ls -lh build/app/outputs/flutter-apk/

      - name: Extract version from tag
        if: github.ref_type == 'tag'
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          name: "RECOMP ${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') }}
          generate_release_notes: true
          body: |
            ## RECOMP ${{ steps.version.outputs.VERSION }}

            Xbox 360 static recompilation launcher for Android.

            ### Download
            Choose the APK matching your device's CPU architecture:
            | File | Architecture | Devices |
            |------|-------------|---------|
            | `app-arm64-v8a-release.apk` | ARM64 | Most modern phones (recommended) |
            | `app-armeabi-v7a-release.apk` | ARM32 | Older 32-bit devices |
            | `app-x86_64-release.apk` | x86_64 | Emulators / Intel chips |

            ### Requirements
            - Android 7.0+ (API 24)
            - **Qualcomm Adreno GPU** (Snapdragon) — required for Vulkan compatibility
            - 4 GB RAM minimum, 6 GB recommended
            - Legally-obtained Xbox 360 game files (.xex, .iso, .god)

            ### Notes
            > ⚠️ This release contains the launcher UI only. Engine integration is in progress.
            > Only import games you legally own.

          files: |
            recomp-launcher/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            recomp-launcher/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            recomp-launcher/build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
